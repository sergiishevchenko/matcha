{% extends "base.html" %}
{% block title %}Resend verification - Matcha{% endblock %}
{% block content %}
<div class="form-box">
    <h1>Resend verification</h1>
    <p>Enter your email to receive a new verification link.</p>
    <form method="post" action="{{ url_for('auth.resend_verification') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email" value="{{ request.form.email or '' }}">
        </div>
        <button type="submit" class="btn btn-block">Send verification link</button>
    </form>
    <p class="form-links"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
</div>
{% endblock %}
